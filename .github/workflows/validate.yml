name: Validate plugin manifest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace and plugin manifests
        run: |
          set -e

          jq -e '.name and .owner.name and (.plugins | length > 0)' .claude-plugin/marketplace.json > /dev/null
          echo "marketplace.json: ok"

          jq -e '.name and .version' .claude-plugin/plugin.json > /dev/null
          jq -e '.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")' .claude-plugin/plugin.json > /dev/null
          echo "plugin.json: ok"

          test -f skills/promptify/SKILL.md
          grep -q '^name:' skills/promptify/SKILL.md
          grep -q '^description:' skills/promptify/SKILL.md
          echo "SKILL.md: ok"

          for f in claude-families openai-families goal-vs-normal detection-fallbacks; do
            test -f "skills/promptify/references/$f.md"
          done
          echo "reference files: ok"

          test -L .agents/skills/promptify
          echo "Codex discovery symlink: ok"

          echo "All checks passed"
